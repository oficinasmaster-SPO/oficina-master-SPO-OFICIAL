<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#ffffff" />
    <style>
      /* Reserva espaço para o root durante o carregamento — elimina CLS */
      #root { min-height: 100vh; }
      /* Skeleton do loading inicial para evitar tela branca */
      body { margin: 0; background: #f9fafb; font-family: system-ui, sans-serif; }
    </style>
    <script>
      const originalWarn = console.warn;
      console.warn = function(...args) {
        if (args.length > 0 && typeof args[0] === 'string' && args[0].includes('Datadog Browser SDK')) {
          if (args.length > 1 && typeof args[1] === 'string' && args[1].includes('No storage available')) {
            return;
          }
          if (args[0].includes('No storage available')) {
            return;
          }
        }
        originalWarn.apply(console, args);
      };
    </script>
    <link rel="icon" type="image/png" href="https://i.imgur.com/AYi86bZ.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Oficinas Master</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
